<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>海迪耶压力表</title>
<style>
:root{
    --bg:#080e1c;
    --surface:#0e1730;--surface2:#111c38;
    --border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.1);
    --text:#f0f4fa;--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.22);
    --blue:#4a8eff;--blue-light:#7db4ff;--blue-glow:rgba(74,142,255,.12);
    --green:#34d575;--green-glow:rgba(52,213,117,.1);
    --red:#ff5c5c;--red-glow:rgba(255,92,92,.08);
    --yellow:#ffc53d;--yellow-glow:rgba(255,197,61,.08);
    --purple:#a78bfa;--purple-glow:rgba(167,139,250,.08);
    --radius:16px;--radius-lg:20px;--radius-sm:10px;--radius-xs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ===== Background — 低开销 ===== */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.bg-orb:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,#1a3a8a,transparent 65%);top:-30%;left:-20%;opacity:.1;animation:orbA 28s ease-in-out infinite alternate}
.bg-orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,#2563eb,transparent 65%);bottom:-25%;right:-15%;opacity:.07;animation:orbB 32s ease-in-out infinite alternate}
@keyframes orbA{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(60px,-40px,0)}}
@keyframes orbB{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-50px,30px,0)}}
.bg-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,transparent 40%,rgba(8,14,28,.6) 100%)}

/* ===== Header — 仅 header 做 blur ===== */
.header{position:sticky;top:0;z-index:50;background:rgba(8,14,28,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:640px;margin:0 auto;padding:0 20px}
.header-top{display:flex;align-items:center;justify-content:center;gap:12px;padding:18px 0 6px}
.header-icon-wrap{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,rgba(74,142,255,.12),rgba(167,139,250,.08));display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(74,142,255,.1)}
.header-title{font-size:20px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#fff 15%,var(--blue-light) 60%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:11px;color:var(--text3);text-align:center;padding:0 0 12px;letter-spacing:4px;text-transform:uppercase;font-weight:500}
.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 0;font-size:11px;color:var(--text3);border-top:1px solid rgba(255,255,255,.025)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(52,213,117,.4);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ===== Main ===== */
main{padding:16px 16px 0;max-width:640px;margin:0 auto;position:relative;z-index:1;padding-bottom:100px}
.section-label{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-left:2px}
.section-label .sec-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.section-label .sec-icon.blue{background:var(--blue-glow);border:1px solid rgba(74,142,255,.06)}
.section-label .sec-icon.green{background:var(--green-glow);border:1px solid rgba(52,213,117,.06)}
.section-label .sec-icon.purple{background:var(--purple-glow);border:1px solid rgba(167,139,250,.06)}
.section-label span{font-size:11.5px;font-weight:700;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase}
.section-label::after{content:"";flex:1;height:1px;background:var(--border)}

/* ===== Stats ===== */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 8px 12px;text-align:center;position:relative;overflow:hidden;transition:border-color .3s,transform .3s}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.stat-card::before{content:"";position:absolute;top:0;left:8%;right:8%;height:3px;border-radius:0 0 3px 3px;opacity:.7}
.stat-card:nth-child(1)::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);box-shadow:0 0 12px 2px rgba(74,142,255,.25)}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,transparent,var(--green),transparent);box-shadow:0 0 12px 2px rgba(52,213,117,.25)}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,transparent,var(--red),transparent);box-shadow:0 0 12px 2px rgba(255,92,92,.25)}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,transparent,var(--yellow),transparent);box-shadow:0 0 12px 2px rgba(255,197,61,.25)}
.stat-val{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums}
.stat-val.blue{color:var(--blue-light)}.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.yellow{color:var(--yellow)}
.stat-lbl{font-size:.6rem;color:var(--text3);margin-top:5px;font-weight:600;letter-spacing:.8px}

/* ===== Form ===== */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;position:relative;overflow:hidden}
.form-row{margin-bottom:16px}
.form-label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.form-label .icon{font-size:14px;opacity:.8}
.form-input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:rgba(0,0,0,.15);color:var(--text);font-size:15px;outline:none;transition:border-color .25s,box-shadow .25s}
.form-input::placeholder{color:rgba(255,255,255,.12)}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.form-input.date-input{color-scheme:dark}
.form-hint{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text3)}
.form-hint .badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;background:var(--blue-glow);color:var(--blue-light);border:1px solid rgba(74,142,255,.08)}
.form-actions{display:flex;gap:10px}
.clear-btn,.import-btn{flex:1;padding:11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(0,0,0,.1);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:7px}
.clear-btn{color:var(--text3)}.clear-btn:hover{border-color:rgba(255,92,92,.25);color:var(--red);background:var(--red-glow)}
.import-btn{color:var(--blue-light);border-color:rgba(74,142,255,.1)}.import-btn:hover{border-color:rgba(74,142,255,.25);background:var(--blue-glow)}

/* ===== Floor Cards — 纯色背景，无 blur ===== */
.floor-list{display:flex;flex-direction:column;gap:10px}
.floor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .3s,transform .3s,opacity .3s;position:relative;content-visibility:auto;contain-intrinsic-size:0 160px;opacity:.5}
.floor-card:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.floor-card:focus-within{opacity:1;border-color:rgba(74,142,255,.2);box-shadow:0 0 0 1px rgba(74,142,255,.06),0 4px 20px rgba(74,142,255,.04)}
.floor-card.has-value{border-color:rgba(74,142,255,.08);opacity:1}
.floor-card.has-value::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);box-shadow:0 0 8px rgba(52,213,117,.3);border-radius:3px 0 0 3px}
.floor-card.alert{border-color:rgba(255,92,92,.12);box-shadow:0 0 20px rgba(255,92,92,.02)}
.floor-card.alert::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);box-shadow:0 0 8px rgba(255,92,92,.3);border-radius:3px 0 0 3px;animation:alertPulse 2s ease-in-out infinite}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:.4}}
.floor-main{display:flex;align-items:stretch}
.floor-badge{width:58px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#162d6e,#0f1d45);font-size:13px;font-weight:800;color:rgba(255,255,255,.85);flex-shrink:0;letter-spacing:.5px;position:relative;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.floor-badge::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent 50%)}
.floor-badge.badge-underground{background:linear-gradient(180deg,#1a2a4a,#0d1528);color:rgba(180,200,230,.8)}
.floor-badge.badge-mid{background:linear-gradient(180deg,#162d6e,#0f1d45)}
.floor-badge.badge-high{background:linear-gradient(180deg,#2a1f5e,#1a1245);color:rgba(220,200,255,.85)}
.floor-body{flex:1;padding:14px 14px 14px 12px;display:flex;flex-direction:column;gap:4px}
.floor-reading{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.floor-row-reading{display:flex;align-items:center;gap:8px}
.floor-label{font-size:10px;color:var(--text3);min-width:42px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.floor-value{font-size:13px;font-weight:700;font-family:"SF Mono","Fira Code",monospace}
.floor-value.last{color:var(--text2)}
.diff-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;font-family:"SF Mono","Fira Code",monospace}
.diff-badge.up{background:rgba(52,213,117,.07);color:#86efac;border:1px solid rgba(52,213,117,.08)}
.diff-badge.down{background:rgba(255,92,92,.07);color:#fca5a5;border:1px solid rgba(255,92,92,.08)}
.diff-badge.same{background:rgba(255,197,61,.07);color:#fde68a;border:1px solid rgba(255,197,61,.08)}
.pressure-input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:rgba(0,0,0,.12);color:var(--text);font-size:14px;font-family:"SF Mono","Fira Code",monospace;outline:none;transition:border-color .25s,box-shadow .25s;text-align:right}
.pressure-input::placeholder{color:rgba(255,255,255,.1);font-size:11px}
.pressure-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-glow);background:rgba(0,0,0,.22)}
.pressure-input::-webkit-inner-spin-button{-webkit-appearance:none}

/* ===== Action Bar ===== */
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,14,28,.94);border-top:1px solid var(--border);padding:12px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.action-inner{max-width:640px;margin:0 auto;display:flex;gap:10px}
.action-btn{flex:1;padding:15px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.3px;position:relative}
.action-btn:active{transform:scale(.96)}
.btn-save{background:linear-gradient(135deg,var(--blue),#2a5ad4);color:white;box-shadow:0 4px 16px rgba(74,142,255,.15)}
.btn-save:hover{box-shadow:0 6px 24px rgba(74,142,255,.25);transform:translateY(-1px)}
.btn-save.success{background:linear-gradient(135deg,#16a34a,var(--green))}
.btn-history{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-history:hover{background:rgba(255,255,255,.04);border-color:var(--border-hover)}
.btn-export{background:var(--surface2);color:var(--text2);border:1px solid var(--border);flex:0.5}
.btn-export:hover{background:rgba(255,255,255,.04)}

/* ===== Modals ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface2);border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;animation:slideUp .45s cubic-bezier(.22,1,.36,1);border:1px solid var(--border);border-bottom:none;scrollbar-width:none;box-shadow:0 -8px 40px rgba(0,0,0,.3)}
.modal::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin:14px auto 8px}
.modal-header{padding:8px 20px 16px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:800}
.modal-close{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{border-color:var(--border-hover)}
.modal-body{padding:0 16px 24px}

/* ===== History Page ===== */
#historyPage{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
#historyPage main{max-width:640px;margin:0 auto;padding:16px 16px 40px}
.hist-empty{text-align:center;padding:30vh 20px 0;color:var(--text3)}
.hist-empty-icon{font-size:48px;margin-bottom:16px;opacity:.25}
.hist-empty-text{font-size:15px;font-weight:600}
.hist-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.hist-search{flex:1;min-width:0;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:rgba(0,0,0,.15);color:var(--text);font-size:13px;outline:none;transition:border-color .25s,box-shadow .25s}
.hist-search:focus{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-glow)}
.hist-search::placeholder{color:rgba(255,255,255,.15)}
.hist-compare-btn{padding:10px 16px;border:1.5px solid rgba(167,139,250,.15);border-radius:var(--radius-sm);background:var(--purple-glow);color:var(--purple);font-size:12px;font-weight:700;cursor:pointer;transition:all .25s;white-space:nowrap}
.hist-compare-btn:hover{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.12)}
.hist-compare-btn:disabled{opacity:.35;cursor:not-allowed}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s;position:relative}
.hist-card:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.hist-card.expanded{border-color:rgba(74,142,255,.1)}
.hist-card .hist-badge{position:absolute;top:12px;right:14px;width:10px;height:10px;border-radius:50%;z-index:2}
.hist-card .hist-badge.ok{background:var(--green);box-shadow:0 0 6px rgba(52,213,117,.4)}
.hist-card .hist-badge.warn{background:var(--red);box-shadow:0 0 6px rgba(255,92,92,.4);animation:alertPulse 2s ease-in-out infinite}
.hist-card-select{position:absolute;top:14px;left:14px;width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);background:rgba(0,0,0,.1);display:none;align-items:center;justify-content:center;font-size:11px;color:var(--text2);z-index:2;transition:all .2s}
.hist-selecting .hist-card-select{display:flex}
.hist-card-select.selected{border-color:var(--purple);background:var(--purple);color:#fff}
.hist-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.hist-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid rgba(74,142,255,.06)}
.hist-icon.ok{background:var(--green-glow)}.hist-icon.warn{background:var(--red-glow)}
.hist-info{flex:1;min-width:0}
.hist-date{font-size:14px;font-weight:700}
.hist-meta{font-size:11px;color:var(--text2);display:flex;gap:10px;margin-top:3px;flex-wrap:wrap}
.hist-arrow{color:var(--text3);font-size:12px;transition:transform .3s}
.hist-card.expanded .hist-arrow{transform:rotate(180deg)}
.hist-detail{max-height:0;overflow:hidden;transition:max-height .4s}
.hist-card.expanded .hist-detail{max-height:800px}
.hist-detail-inner{padding:0 16px 16px;border-top:1px solid var(--border)}
.hist-floor{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:12px}
.hist-floor+.hist-floor{border-top:1px dashed rgba(255,255,255,.03)}
.hist-floor-name{color:var(--text2);font-weight:600;min-width:30px}
.hist-floor-val{font-family:"SF Mono",monospace;font-size:12px}
.hist-load-btn{width:100%;padding:11px;border:1px solid rgba(74,142,255,.08);border-radius:var(--radius-sm);background:var(--blue-glow);color:var(--blue-light);font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;transition:all .25s}
.hist-load-btn:hover{background:rgba(74,142,255,.12)}

/* ===== Compare Page ===== */
#comparePage{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
#comparePage main{max-width:640px;margin:0 auto;padding:16px 16px 40px}
.compare-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.compare-tag{flex:1;padding:12px;border-radius:var(--radius-sm);text-align:center;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface)}
.compare-tag:first-child{border-color:rgba(74,142,255,.15);color:var(--blue-light)}
.compare-tag:last-child{border-color:rgba(167,139,250,.15);color:var(--purple)}
.compare-vs{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px}
.compare-table{width:100%;border-collapse:collapse}
.compare-table th{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15)}
.compare-table th:first-child{text-align:left}
.compare-table td{padding:10px 8px;text-align:center;font-family:"SF Mono",monospace;font-size:12px;border-bottom:1px solid rgba(255,255,255,.02)}
.compare-table td:first-child{text-align:left;font-family:inherit;font-weight:700;color:var(--text2);font-size:11px;position:relative;padding-left:18px}
.compare-table td:first-child::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--blue);opacity:.4}
.compare-table tr:hover{background:rgba(255,255,255,.02)}
.compare-table tr:hover td:first-child::before{opacity:.7}
.compare-change{font-size:11px;font-weight:700;padding:4px 14px;border-radius:8px;display:inline-block;min-width:60px}
.compare-change.up{background:rgba(52,213,117,.1);color:#86efac;border:1px solid rgba(52,213,117,.12)}
.compare-change.down{background:rgba(255,92,92,.1);color:#fca5a5;border:1px solid rgba(255,92,92,.12)}
.compare-change.same{background:rgba(255,197,61,.1);color:#fde68a;border:1px solid rgba(255,197,61,.12)}
.compare-summary{margin-top:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.compare-stat{text-align:center}
.compare-stat-val{font-size:1.3rem;font-weight:800}
.compare-stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;letter-spacing:.5px}

/* ===== Export/Import ===== */
.export-opt{display:flex;align-items:center;gap:14px;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .25s;background:rgba(0,0,0,.06)}
.export-opt:hover{border-color:rgba(224,176,96,.15);background:rgba(224,176,96,.02);transform:translateX(3px)}
.export-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.export-icon.c1{background:var(--green-glow)}.export-icon.c2{background:var(--blue-glow)}.export-icon.c3{background:var(--purple-glow)}
.export-t{font-size:14px;font-weight:700}.export-d{font-size:11px;color:var(--text3);margin-top:2px}
.export-cancel{width:100%;padding:14px;border:none;background:rgba(255,255,255,.01);color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;border-top:1px solid var(--border);margin-top:4px;transition:all .2s}
.export-cancel:hover{background:rgba(255,255,255,.03)}

/* ===== Import ===== */
.import-drop{border:2px dashed rgba(255,255,255,.06);border-radius:var(--radius);padding:36px 20px;text-align:center;margin-bottom:14px;transition:border-color .3s,background .3s;cursor:pointer;position:relative}
.import-drop:hover,.import-drop.dragover{border-color:var(--blue);background:var(--blue-glow)}
.import-drop-icon{font-size:40px;margin-bottom:10px;opacity:.4}
.import-drop-text{font-size:13px;color:var(--text2);font-weight:600}
.import-drop-hint{font-size:11px;color:var(--text3);margin-top:6px}
.import-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.import-preview{background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;max-height:220px;overflow-y:auto}
.import-preview-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px}
.import-preview-row{display:flex;gap:12px;font-size:12px;padding:5px 0;font-family:"SF Mono",monospace}
.import-preview-row+.import-preview-row{border-top:1px dashed rgba(255,255,255,.03)}
.import-apply-btn{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--blue),#2a5ad4);color:white;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 4px 16px rgba(74,142,255,.15)}
.import-apply-btn:hover{box-shadow:0 6px 24px rgba(74,142,255,.25);transform:translateY(-1px)}
.import-apply-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== Toast ===== */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(14,23,48,.97);color:white;padding:13px 26px;border-radius:18px;font-size:13px;font-weight:600;opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);pointer-events:none;z-index:9999;max-width:85%;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Animations ===== */
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

/* ===== Print ===== */
@media print{
    .header,.action-bar,.bg,.toast,.hist-toolbar,.hist-card-select,.hist-compare-btn,.hist-load-btn{display:none!important}
    #historyPage,#comparePage{position:static!important;background:#fff!important;color:#333!important}
    .floor-card{break-inside:avoid;border:1px solid #ddd!important}
    main{padding:0}body{background:#fff;color:#333}
    .floor-card,.form-card,.stat-card{background:#fff!important}
    .floor-label,.floor-value,.stat-val,.form-label,.diff-badge{color:#333!important;-webkit-text-fill-color:#333!important}
    .pressure-input{border-color:#ccc!important;color:#333!important}
    .hist-card{border:1px solid #ddd!important;background:#fff!important}
    .hist-badge{print-color-adjust:exact;-webkit-print-color-adjust:exact}
    .compare-table td,.compare-table th{border-bottom:1px solid #ddd!important;color:#333!important}
}

/* ===== Responsive ===== */
@media(max-width:380px){
    .floor-badge{width:44px;font-size:11px}.floor-body{padding:10px}
    .pressure-input{padding:7px 8px;font-size:12px}
    .stats-row{gap:6px}.stat-card{padding:12px 4px 10px}.stat-val{font-size:1.2rem}
    .header-title{font-size:17px}
}
</style>
</head>
<body>

<div id="mainPage">
<div class="bg">
    <div class="bg-orb"></div><div class="bg-orb"></div>
    <div class="bg-vignette"></div>
</div>

<header class="header">
    <div class="header-inner">
        <div class="header-top">
            <div class="header-icon-wrap">🔧</div>
            <h1 class="header-title">海迪耶国际饭店</h1>
        </div>
        <div class="header-sub">末端试水压力表检查记录</div>
        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">就绪</span>
        </div>
    </div>
</header>

<main>
    <div class="section-label"><span class="sec-icon blue">📊</span><span>概览</span></div>
    <div class="stats-row">
        <div class="stat-card"><div class="stat-val blue" id="statTotal">20</div><div class="stat-lbl">监测楼层</div></div>
        <div class="stat-card"><div class="stat-val green" id="statFilled">0</div><div class="stat-lbl">已录入</div></div>
        <div class="stat-card"><div class="stat-val red" id="statAlert">0</div><div class="stat-lbl">压力变化</div></div>
        <div class="stat-card"><div class="stat-val yellow" id="statHistory">0</div><div class="stat-lbl">历史记录</div></div>
    </div>

    <div class="section-label"><span class="sec-icon green">📝</span><span>基本信息</span></div>
    <div class="form-card">
        <div class="form-row">
            <label class="form-label"><span class="icon">👤</span> 检查人</label>
            <input type="text" class="form-input" id="inspector" placeholder="输入检查人姓名" autocomplete="off">
        </div>
        <div class="form-row">
            <label class="form-label"><span class="icon">📅</span> 检查日期</label>
            <input type="date" class="form-input date-input" id="dateInput">
            <div class="form-hint" id="formHint"></div>
        </div>
        <div class="form-actions">
            <button class="clear-btn" onclick="clearCurrent()">🔄 清空当前</button>
            <button class="import-btn" onclick="showImport()">📥 导入数据</button>
        </div>
    </div>

    <div class="section-label"><span class="sec-icon purple">🔧</span><span>压力数据</span></div>
    <div class="floor-list" id="floorList"></div>
</main>

<div class="action-bar">
    <div class="action-inner">
        <button class="action-btn btn-history" onclick="showHistory()">📋 历史</button>
        <button class="action-btn btn-save" id="saveBtn" onclick="saveData()">💾 保存数据</button>
        <button class="action-btn btn-export" onclick="showExport()">📤</button>
    </div>
</div>
</div><!-- /mainPage -->

<!-- ===== History Page ===== -->
<div id="historyPage" style="display:none">
    <header class="header">
        <div class="header-inner">
            <div class="header-top" style="justify-content:flex-start;gap:10px">
                <button onclick="closeHistory()" style="width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">←</button>
                <h1 class="header-title" style="font-size:18px">📋 历史检查记录</h1>
            </div>
        </div>
    </header>
    <main style="padding-bottom:24px">
        <div id="historyList"></div>
    </main>
</div>

<!-- ===== Compare Page ===== -->
<div id="comparePage" style="display:none">
    <header class="header">
        <div class="header-inner">
            <div class="header-top" style="justify-content:flex-start;gap:10px">
                <button onclick="closeCompare()" style="width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">←</button>
                <h1 class="header-title" style="font-size:18px">📊 趋势对比</h1>
            </div>
        </div>
    </header>
    <main style="padding-bottom:24px">
        <div id="compareContent"></div>
    </main>
</div>

<div class="modal-overlay" id="exportModal">
    <div class="modal" style="max-height:60vh">
        <div class="modal-handle"></div>
        <div class="modal-header"><div class="modal-title">📤 导出数据</div><button class="modal-close" onclick="closeModal('exportModal')">✕</button></div>
        <div class="modal-body">
            <div class="export-opt" onclick="exportCSV()"><div class="export-icon c1">📊</div><div><div class="export-t">导出 CSV</div><div class="export-d">Excel / WPS 可直接打开</div></div></div>
            <div class="export-opt" onclick="exportJSON()"><div class="export-icon c2">{ }</div><div><div class="export-t">导出 JSON</div><div class="export-d">完整数据备份</div></div></div>
            <div class="export-opt" onclick="printData()"><div class="export-icon c3">🖨️</div><div><div class="export-t">打印记录</div><div class="export-d">当前数据打印</div></div></div>
            <button class="export-cancel" onclick="closeModal('exportModal')">取消</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="importModal">
    <div class="modal" style="max-height:80vh">
        <div class="modal-handle"></div>
        <div class="modal-header"><div class="modal-title">📥 导入数据</div><button class="modal-close" onclick="closeModal('importModal')">✕</button></div>
        <div class="modal-body">
            <div class="import-drop" id="importDrop">
                <div class="import-drop-icon">📂</div>
                <div class="import-drop-text">点击选择文件或拖拽到此处</div>
                <div class="import-drop-hint">支持 CSV 和 JSON 格式</div>
                <input type="file" id="importFile" accept=".csv,.json" onchange="handleImportFile(this)">
            </div>
            <div id="importPreview" style="display:none"></div>
            <button class="import-apply-btn" id="importApplyBtn" disabled onclick="applyImport()">✅ 应用导入数据</button>
            <button class="export-cancel" onclick="closeModal('importModal')" style="margin-top:8px">取消</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Config =====
const FLOORS=["B2","B1","1F","4F","5F","6F","8F","9F","10F","11F","12F","13F","14F","15F","16F","17F","18F","19F","20F","21F"];
const SKR='haidiye_pressure_records',SKI='haidiye_pressure_inspector';

// ===== State =====
let currentData=new Map(),records=[],lastRecord=null,lastInspector='';
let inputTimer=null;

// Pressure color
function pressureColor(v){if(v<.8)return'#4a8eff';if(v<=1.6)return'#34d575';if(v<=2)return'#ffc53d';return'#ff5c5c'}

// Stat animation
const sa={f:{el:null,cur:0},a:{el:null,cur:0},h:{el:null,cur:0}};

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
    sa.f.el=document.getElementById('statFilled');
    sa.a.el=document.getElementById('statAlert');
    sa.h.el=document.getElementById('statHistory');
    loadData();renderFloors();renderStats();
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value=today;
    if(lastInspector)document.getElementById('inspector').value=lastInspector;
    loadDateData(today);
    document.getElementById('dateInput').addEventListener('change',onDateChange);
    document.getElementById('inspector').addEventListener('input',()=>{lastInspector=document.getElementById('inspector').value});
    document.addEventListener('keydown',e=>{
        if(e.key==='Escape'){
            if(document.getElementById('comparePage').style.display!=='none'){closeCompare();return}
            if(document.getElementById('historyPage').style.display!=='none'){closeHistory();return}
            document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));
        }
        if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveData()}
    });
    const drop=document.getElementById('importDrop');
    drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dragover')});
    drop.addEventListener('dragleave',()=>drop.classList.remove('dragover'));
    drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('dragover');
        if(e.dataTransfer.files.length){document.getElementById('importFile').files=e.dataTransfer.files;handleImportFile(document.getElementById('importFile'))}
    });
});

// ===== Storage =====
function loadData(){try{const r=localStorage.getItem(SKR);if(r)records=JSON.parse(r);lastInspector=localStorage.getItem(SKI)||'';if(records.length)lastRecord=records.reduce((a,b)=>new Date(b.date)>new Date(a.date)?b:a)}catch(e){console.error(e)}}
function loadDateData(date){const rec=records.find(r=>r.date===date);if(rec){currentData=new Map();rec.data.forEach(d=>{if(d.current!=null)currentData.set(d.floor,d.current)});if(rec.inspector)document.getElementById('inspector').value=rec.inspector;setSt(`已加载 ${date} 的数据`,'info');fHint(true)}else{currentData=new Map();if(lastRecord){lastRecord.data.forEach(d=>{if(d.current!=null)currentData.set(d.floor,d.current)});setSt('已自动填入上次数据，请核实修改','info')}else setSt('新日期，请输入数据','info');if(lastInspector)document.getElementById('inspector').value=lastInspector;fHint(false)}renderFloors();renderStats()}
function onDateChange(){loadDateData(document.getElementById('dateInput').value)}
function fHint(h){document.getElementById('formHint').innerHTML=h?'<span class="badge">已有数据</span>':''}

// ===== Render Floors =====
function renderFloors(){
    const list=document.getElementById('floorList');
    // Build all HTML at once, single innerHTML write
    let html='';
    for(let i=0;i<FLOORS.length;i++){
        const fl=FLOORS[i],lv=lastVal(fl),cv=currentData.get(fl)??null;
        const df=(lv!=null&&cv!=null)?cv-lv:null;
        const has=cv!=null,alert=df!=null&&df<0;
        const delay=Math.min(i*30,500);
        const badgeCls=fl.startsWith('B')?'badge-underground':parseInt(fl)>=11?'badge-high':'badge-mid';

        let dH='---';
        if(df!=null){const c=df>0?'up':df<0?'down':'same';const a=df>0?'↑':df<0?'↓':'→';
            dH=`<span class="diff-badge ${c}">${a} ${df>=0?'+':''}${df.toFixed(2)}</span>`}

        html+=`<div class="floor-card ${has?'has-value':''} ${alert?'alert':''}" style="animation:cardIn .4s ${delay}ms both" id="fc-${fl}">
<div class="floor-main"><div class="floor-badge ${badgeCls}">${fl}</div><div class="floor-body">
<div class="floor-reading">
  <div class="floor-row-reading"><span class="floor-label">上次</span><span class="floor-value last">${lv!=null?lv.toFixed(2)+' MPa':'---'}</span></div>
  <div class="floor-row-reading"><span class="floor-label">本次</span><input type="number" step="0.01" min="0" max="2.5" class="pressure-input" placeholder="输入压力值" value="${cv!=null?cv:''}" oninput="onInput('${fl}',this.value)"></div>
  <div class="floor-row-reading" id="diff-${fl}"><span class="floor-label">差值</span>${dH}</div>
</div>
</div></div></div>`;
    }
    list.innerHTML=html;
}

function lastVal(fl){if(!lastRecord)return null;const d=lastRecord.data.find(d=>d.floor===fl);return d?(d.current??null):null}

// ===== Input =====
function onInput(fl,val){
    if(val==='')currentData.delete(fl);
    else{const n=parseFloat(val);if(isNaN(n))return;currentData.set(fl,n)}
    const cv=currentData.get(fl)??null;
    // Diff
    updDiff(fl);
    // Card state
    const card=document.getElementById('fc-'+fl);
    if(card){const lv=lastVal(fl),df=(lv!=null&&cv!=null)?cv-lv:null;
        card.classList.toggle('has-value',cv!=null);card.classList.toggle('alert',df!=null&&df<0)}
    // Debounced stats
    clearTimeout(inputTimer);inputTimer=setTimeout(renderStats,100);
}

function updDiff(fl){
    const lv=lastVal(fl),cv=currentData.get(fl)??null,df=(lv!=null&&cv!=null)?cv-lv:null;
    const el=document.getElementById('diff-'+fl);if(!el)return;
    let h='---';
    if(df!=null){const c=df>0?'up':df<0?'down':'same';a=df>0?'↑':df<0?'↓':'→';
        h=`<span class="diff-badge ${c}">${a} ${df>=0?'+':''}${df.toFixed(2)}</span>`}
    el.innerHTML=`<span class="floor-label">差值</span>${h}`;
}

// ===== Animated Stats =====
function animS(k,t){const i=sa[k];if(!i||!i.el)return;const s=i.cur,d=t-s;if(!d)return;const st=performance.now();
    (function f(now){const p=Math.min((now-st)/350,1);i.cur=Math.round(s+d*(1-Math.pow(1-p,3)));i.el.textContent=i.cur;if(p<1)requestAnimationFrame(f)})(performance.now())}
function renderStats(){let f=0,al=0;FLOORS.forEach(fl=>{if(currentData.has(fl))f++;const l=lastVal(fl),c=currentData.get(fl);if(l!=null&&c!=null&&c-l!==0)al++});animS('f',f);animS('a',al);animS('h',records.length)}

// ===== Status =====
function setSt(t,type='info'){document.getElementById('statusText').textContent=t;
    const d=document.getElementById('statusDot');d.style.background=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--blue)';
    d.style.boxShadow=type==='success'?'0 0 8px rgba(52,213,117,.4)':type==='error'?'0 0 8px rgba(255,92,92,.4)':'0 0 8px rgba(74,142,255,.4)'}

// ===== Save =====
function saveData(){
    const insp=document.getElementById('inspector').value.trim(),date=document.getElementById('dateInput').value;
    if(!insp){toast('⚠️ 请输入检查人姓名');setSt('请输入检查人姓名','error');return}
    if(!date){toast('⚠️ 请选择检查日期');return}
    if(!currentData.size){toast('⚠️ 至少输入一个楼层的数据');return}
    const data=FLOORS.map(f=>({floor:f,last:lastVal(f),current:currentData.get(f)??null,diff:null}));
    data.forEach(d=>{d.diff=(d.last!=null&&d.current!=null)?+(d.current-d.last).toFixed(2):null});
    const rec={date,inspector:insp,data,timestamp:new Date().toISOString()};
    const idx=records.findIndex(r=>r.date===date);
    if(idx>=0)records[idx]=rec;else records.push(rec);
    try{localStorage.setItem(SKR,JSON.stringify(records));localStorage.setItem(SKI,insp)}catch(e){toast('❌ 保存失败');return}
    lastRecord=rec;lastInspector=insp;fHint(true);
    const btn=document.getElementById('saveBtn');btn.classList.add('success');btn.innerHTML='✅ 已保存';
    setTimeout(()=>{btn.classList.remove('success');btn.innerHTML='💾 保存数据'},2000);
    setSt(`已保存 ${date} - ${insp}`,'success');toast(`✅ 数据已保存 (${date})`);renderStats();
}
function clearCurrent(){currentData=new Map();renderFloors();renderStats();setSt('已清空当前数据','info');toast('🔄 已清空')}

// ===== Import =====
let pendingImp=null;
function showImport(){pendingImp=null;document.getElementById('importFile').value='';document.getElementById('importPreview').style.display='none';document.getElementById('importApplyBtn').disabled=true;document.getElementById('importModal').classList.add('show')}
function handleImportFile(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=function(e){
    const t=e.target.result,ext=f.name.split('.').pop().toLowerCase();
    try{let p=null;if(ext==='json')p=pJSON(t);else if(ext==='csv')p=pCSV(t);else{toast('❌ 不支持的格式');return}
    if(p&&p.size>0){pendingImp=p;showImpPrev(p);document.getElementById('importApplyBtn').disabled=false;toast(`✅ 解析成功，${p.size} 条`)}else toast('⚠️ 未识别到有效数据')
    }catch(err){toast('❌ 解析失败: '+err.message)}};rd.readAsText(f)}
function pJSON(t){const o=JSON.parse(t),r=new Map();
    if(o.data&&Array.isArray(o.data))o.data.forEach(d=>{if(d.floor&&d.current!=null)r.set(d.floor,parseFloat(d.current))});
    else if(typeof o==='object'&&!Array.isArray(o))FLOORS.forEach(f=>{if(o[f]!=null)r.set(f,parseFloat(o[f]))});
    else if(Array.isArray(o))o.forEach(d=>{const fl=d.floor||d.楼层,v=d.current??d.value??d.压力??d.本次;if(fl&&v!=null)r.set(fl,parseFloat(v))});return r}
function pCSV(t){const ls=t.trim().split(/\r?\n/);if(ls.length<2)throw new Error('至少需要表头和一行数据');const r=new Map(),hd=ls[0].split(',').map(h=>h.trim().replace(/"/g,''));
    let fi=-1,vi=-1;hd.forEach((h,i)=>{const l=h.toLowerCase();if(l==='楼层'||l==='floor')fi=i;if(l.includes('本次')||l==='当前'||l==='current'||l==='value'||l==='压力')vi=i});
    if(fi===-1){const fv=ls.slice(1).map(l=>l.split(',')[0]?.trim().replace(/"/g,''));if(fv.some(v=>FLOORS.includes(v)))fi=0}
    if(vi===-1){vi=hd.length>1?1:0;if(fi===vi)vi=hd.length>2?2:vi}if(fi===-1)throw new Error('未找到楼层列');
    for(let i=1;i<ls.length;i++){const c=ls[i].split(',').map(x=>x.trim().replace(/"/g,'')),fl=c[fi],v=parseFloat(c[vi]);if(fl&&FLOORS.includes(fl)&&!isNaN(v))r.set(fl,v)}return r}
function showImpPrev(d){const el=document.getElementById('importPreview');let rows='';d.forEach((v,f)=>{rows+=`<div class="import-preview-row"><span style="min-width:40px;color:var(--text2)">${f}</span><span>${v.toFixed(2)} MPa</span></div>`});
    el.innerHTML=`<div class="import-preview-title">📋 预览 (${d.size} 条)</div>${rows}`;el.style.display='block'}
function applyImport(){if(!pendingImp)return;const tmp=new Map();if(pendingImp instanceof Map)pendingImp.forEach((v,f)=>tmp.set(f,v));if(!tmp.size){toast('⚠️ 无有效数据');return}
    tmp.forEach((v,f)=>currentData.set(f,v));renderFloors();renderStats();closeModal('importModal');setSt(`已导入 ${tmp.size} 条数据`,'success');toast(`✅ 已导入 ${tmp.size} 条`)}

// ===== History =====
let histSelecting=false,histSelected=new Set();

function showHistory(){
    histSelecting=false;histSelected=new Set();
    const s=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)),el=document.getElementById('historyList');
    if(!s.length){
        el.innerHTML='<div class="hist-empty"><div class="hist-empty-icon">📋</div><div class="hist-empty-text">暂无历史记录</div></div>';
    }else{
        el.innerHTML=`<div class="hist-toolbar"><input type="text" class="hist-search" id="histSearch" placeholder="🔍 搜索日期或检查人…" oninput="filterHist()"><button class="hist-compare-btn" id="compareBtn" onclick="toggleCompareMode()" disabled>📊 对比模式</button></div>`+
            s.map((r,i)=>{
                const fc=r.data.filter(d=>d.current!=null).length,ac=r.data.filter(d=>d.diff!=null&&d.diff<0).length;
                const ok=ac===0;
                return`<div class="hist-card" id="hist-${i}" data-date="${r.date}" data-insp="${r.inspector}" onclick="histCardClick(${i},'${r.date}')">
<div class="hist-card-select" id="hcs-${i}" onclick="event.stopPropagation();toggleHistSelect(${i},'${r.date}')">✓</div>
<div class="hist-badge ${ok?'ok':'warn'}"></div>
<div class="hist-top"><div class="hist-icon ${ok?'ok':'warn'}">${ok?'✅':'⚠️'}</div><div class="hist-info"><div class="hist-date">${r.date}</div><div class="hist-meta"><span>👤 ${r.inspector}</span><span>📊 ${fc}/${FLOORS.length}</span>${ac>0?`<span style="color:var(--red)">⚠ ${ac}下降</span>`:`<span style="color:var(--green)">✓ 全部正常</span>`}</div></div><div class="hist-arrow">▾</div></div>
<div class="hist-detail"><div class="hist-detail-inner">${r.data.filter(d=>d.current!=null).map(d=>{const c=d.diff>0?'color:#86efac':d.diff<0?'color:#fca5a5':'color:#fde68a';return`<div class="hist-floor"><span class="hist-floor-name">${d.floor}</span><span class="hist-floor-val">${d.current.toFixed(2)} MPa</span><span class="hist-floor-val" style="${d.diff!=null?c:''}">${d.diff!=null?(d.diff>=0?'+':'')+d.diff.toFixed(2):'---'}</span></div>`}).join('')}<button class="hist-load-btn" onclick="event.stopPropagation();loadRec('${r.date}')">📥 加载此记录</button></div></div></div>`}).join('');
    }
    document.getElementById('mainPage').style.display='none';
    document.getElementById('historyPage').style.display='block';
}

function closeHistory(){
    document.getElementById('historyPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
}

function histCardClick(i,date){
    if(histSelecting){toggleHistSelect(i,date);return}
    document.getElementById('hist-'+i).classList.toggle('expanded');
}

function toggleCompareMode(){
    histSelecting=!histSelecting;histSelected=new Set();
    document.getElementById('historyPage').querySelectorAll('.hist-card-select').forEach(el=>el.classList.remove('selected'));
    document.getElementById('compareBtn').textContent=histSelecting?'✕ 取消':'📊 对比模式';
}

function toggleHistSelect(i,date){
    if(!histSelecting)return;
    const el=document.getElementById('hcs-'+i);
    if(histSelected.has(date)){histSelected.delete(date);el.classList.remove('selected')}
    else{if(histSelected.size>=2){toast('⚠️ 最多选择两条记录');return}histSelected.add(date);el.classList.add('selected')}
    document.getElementById('compareBtn').disabled=histSelected.size!==2;
    document.getElementById('compareBtn').textContent=histSelected.size===2?'📊 开始对比':'✕ 取消';
    if(histSelected.size===2){
        const arr=[...histSelected];
        showCompare(arr[0],arr[1]);
    }
}

function filterHist(){
    const q=document.getElementById('histSearch').value.toLowerCase();
    document.querySelectorAll('#historyList .hist-card').forEach(c=>{
        const date=c.dataset.date||'',insp=c.dataset.insp||'';
        c.style.display=(date.toLowerCase().includes(q)||insp.toLowerCase().includes(q))?'':'none';
    });
}

function loadRec(d){closeHistory();document.getElementById('dateInput').value=d;loadDateData(d)}

// ===== Compare =====
function showCompare(dateA,dateB){
    const rA=records.find(r=>r.date===dateA),rB=records.find(r=>r.date===dateB);
    if(!rA||!rB){toast('❌ 记录不存在');return}
    const acA=rA.data.filter(d=>d.diff!=null&&d.diff<0).length;
    const acB=rB.data.filter(d=>d.diff!=null&&d.diff<0).length;
    const filledA=rA.data.filter(d=>d.current!=null).length;
    const filledB=rB.data.filter(d=>d.current!=null).length;

    let tableRows='';
    FLOORS.forEach(fl=>{
        const dA=rA.data.find(d=>d.floor===fl),dB=rB.data.find(d=>d.floor===fl);
        const vA=dA?.current??null,vB=dB?.current??null;
        const diff=(vA!=null&&vB!=null)?(vB-vA):null;
        let changeH='---';
        if(diff!=null){
            const cls=diff>0?'up':diff<0?'down':'same';
            const arrow=diff>0?'↑':diff<0?'↓':'→';
            changeH=`<span class="compare-change ${cls}">${arrow} ${diff>=0?'+':''}${diff.toFixed(2)}</span>`;
        }
        tableRows+=`<tr><td>${fl}</td><td>${vA!=null?vA.toFixed(2):'---'}</td><td>${vB!=null?vB.toFixed(2):'---'}</td><td>${changeH}</td></tr>`;
    });

    // Count overall trend
    let ups=0,downs=0,sames=0;
    FLOORS.forEach(fl=>{
        const dA=rA.data.find(d=>d.floor===fl),dB=rB.data.find(d=>d.floor===fl);
        const vA=dA?.current??null,vB=dB?.current??null;
        if(vA!=null&&vB!=null){if(vB-vA>0)ups++;else if(vB-vA<0)downs++;else sames++}
    });

    const el=document.getElementById('compareContent');
    el.innerHTML=`<div class="compare-header">
<div class="compare-tag">📅 ${dateA}<br><span style="font-size:11px;color:var(--text3);font-weight:400">👤 ${rA.inspector} · ${filledA}/${FLOORS.length}</span></div>
<div class="compare-vs">VS</div>
<div class="compare-tag">📅 ${dateB}<br><span style="font-size:11px;color:var(--text3);font-weight:400">👤 ${rB.inspector} · ${filledB}/${FLOORS.length}</span></div>
</div>
<table class="compare-table"><thead><tr><th>楼层</th><th>${dateA}</th><th>${dateB}</th><th>变化</th></tr></thead><tbody>${tableRows}</tbody></table>
<div class="compare-summary">
<div class="compare-stat"><div class="compare-stat-val" style="color:var(--green)">↑${ups}</div><div class="compare-stat-lbl">上升</div></div>
<div class="compare-stat"><div class="compare-stat-val" style="color:var(--red)">↓${downs}</div><div class="compare-stat-lbl">下降</div></div>
<div class="compare-stat"><div class="compare-stat-val" style="color:var(--yellow)">→${sames}</div><div class="compare-stat-lbl">持平</div></div>
</div>`;

    document.getElementById('historyPage').style.display='none';
    document.getElementById('comparePage').style.display='block';
}

function closeCompare(){
    document.getElementById('comparePage').style.display='none';
    document.getElementById('historyPage').style.display='block';
}

// ===== Export =====
function showExport(){document.getElementById('exportModal').classList.add('show')}
function exportCSV(){const B='\uFEFF',rows=['楼层,上次(MPa),本次(MPa),差值(MPa)'];FLOORS.forEach(f=>{const l=lastVal(f),c=currentData.get(f),d=(l!=null&&c!=null)?(c-l).toFixed(2):'';rows.push(`${f},${l!=null?l.toFixed(2):''},${c!=null?c.toFixed(2):''},${d}`)});
    const date=document.getElementById('dateInput').value,insp=document.getElementById('inspector').value;rows.push('',`检查人,${insp}`,`检查日期,${date}`);dl(B+rows.join('\n'),`压力表_${date}.csv`,'text/csv;charset=utf-8');closeModal('exportModal');toast('✅ CSV 已导出')}
function exportJSON(){const date=document.getElementById('dateInput').value,rec=records.find(r=>r.date===date);
    if(rec){dl(JSON.stringify(rec,null,2),`压力表_${date}.json`,'application/json')}
    else{const data=FLOORS.map(f=>({floor:f,last:lastVal(f),current:currentData.get(f)??null,diff:null}));data.forEach(d=>{d.diff=(d.last!=null&&d.current!=null)?+(d.current-d.last).toFixed(2):null});dl(JSON.stringify({date,inspector:document.getElementById('inspector').value,data,timestamp:new Date().toISOString()},null,2),`压力表_${date}.json`,'application/json')}
    closeModal('exportModal');toast('✅ JSON 已导出')}
function printData(){closeModal('exportModal');setTimeout(()=>window.print(),200)}

// ===== Modals =====
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show')})});

// ===== Utils =====
function dl(c,n,t){const b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2200)}
</script>
</body>
